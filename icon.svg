<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#000"/>
  <!-- Stars -->
  <circle cx="80" cy="90" r="3" fill="#aab"/>
  <circle cx="380" cy="130" r="2" fill="#668"/>
  <circle cx="180" cy="60" r="2" fill="#aab"/>
  <circle cx="440" cy="220" r="3" fill="#668"/>
  <circle cx="60" cy="280" r="2" fill="#aab"/>
  <circle cx="330" cy="340" r="2" fill="#668"/>
  <!-- Invader (row 1 crab, scaled up) -->
  <g transform="translate(96 128) scale(20)">
    <g fill="#ff4d4d">
      <rect x="3" y="0" width="2" height="2"/>
      <rect x="10" y="0" width="2" height="2"/>
      <rect x="4" y="2" width="2" height="2"/>
      <rect x="9" y="2" width="2" height="2"/>
      <rect x="2" y="4" width="11" height="2"/>
      <rect x="1" y="6" width="2" height="2"/>
      <rect x="4" y="6" width="7" height="2"/>
      <rect x="12" y="6" width="2" height="2"/>
      <rect x="0" y="8" width="15" height="2"/>
      <rect x="0" y="10" width="2" height="2"/>
      <rect x="3" y="10" width="2" height="2"/>
      <rect x="6" y="10" width="3" height="2"/>
      <rect x="10" y="10" width="2" height="2"/>
      <rect x="13" y="10" width="2" height="2"/>
    </g>
  </g>
  <!-- Player ship -->
  <g transform="translate(184 340) scale(14)">
    <g fill="#0f0">
      <rect x="8" y="0" width="4" height="4"/>
      <rect x="7" y="2" width="6" height="2"/>
      <rect x="6" y="4" width="8" height="2"/>
      <rect x="2" y="6" width="16" height="2"/>
      <rect x="1" y="7" width="18" height="1"/>
      <rect x="0" y="8" width="20" height="2"/>
      <rect x="9" y="3" width="2" height="2" fill="#4dd0ff"/>
    </g>
  </g>
  <!-- Bullet -->
  <rect x="252" y="290" width="8" height="24" fill="#fff"/>
  <!-- Title -->
  <text x="256" y="470" text-anchor="middle" font-family="Courier New, monospace" font-size="52" font-weight="bold" fill="#0f0">VOIDFALL</text>
</svg>
